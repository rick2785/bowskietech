<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Bowskie Tech</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Background glow */
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #6d28d966, transparent);
  filter: blur(120px);
  z-index: 0;
}

/* Input underline style */
.input-line {
  border: none;
  border-bottom: 2px solid #ccc;
  outline: none;
  width: 100%;
  padding: 10px 0;
  background: transparent;
}

.input-line:focus {
  border-bottom: 2px solid #6d28d966; /* purple accent */
}
</style>

</head>

<body class="bg-[#050507] text-white flex items-center justify-center min-h-screen relative">

<!-- Glow -->
<div class="glow top-0 left-0"></div>
<div class="glow bottom-0 right-0"></div>

<!-- FORM CARD -->
<div class="relative z-10 bg-white text-black rounded-3xl shadow-2xl p-10 w-full max-w-xl">

  <h1 class="text-3xl font-bold mb-8">
    Book a Free <span class="text-orange-500">Consultation</span>
  </h1>

  <form action="mailto:bowskietech@gmail.com" method="POST" enctype="text/plain" class="space-y-8">

    <!-- Name -->
    <div>
      <label class="text-gray-600">Full Name</label>
      <input type="text" name="name" class="input-line">
    </div>

    <!-- Email -->
    <div>
      <label class="text-gray-600">Email</label>
      <input type="email" name="email" class="input-line">
    </div>

    <!-- Phone -->
    <div>
      <label class="text-gray-600">Phone Number</label>
      <input type="text" name="phone" class="input-line">
    </div>

    <!-- Description -->
    <div>
      <label class="text-gray-600">Description</label>
      <textarea name="message" rows="3" class="input-line"></textarea>
    </div>

    <!-- Button -->
    <button type="submit"
      class="bg-purple-700 text-white px-8 py-4 rounded-xl text-lg hover:bg-purple-700 transition">
      Let’s Connect!
    </button>

  </form>

</div>

</body>
</html>
